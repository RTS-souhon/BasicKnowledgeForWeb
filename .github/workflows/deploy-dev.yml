name: Deploy to Dev Environment

on:
  push:
    branches:
      - develop

concurrency:
  group: deploy-dev

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd apps/backend
          bun install

      - name: Run database migrations
        run: |
          cd apps/backend
          bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Cloudflare Workers (Dev)
        id: deploy-backend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env dev
          workingDirectory: apps/backend
          secrets: |
            DATABASE_URL
            JWT_SECRET
          environment: dev
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Notify deployment
        run: |
          echo "✅ Backend deployed to dev environment successfully!"
          echo "Worker: basic-knowledge-for-web-backend-dev"
          echo "Deployment URL: ${{ steps.deploy-backend.outputs.deployment-url }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd apps/frontend
          bun install

      - name: Build frontend
        run: |
          cd apps/frontend
          rm -f .env
          bun run build:cloudflare
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload next-env artifact (dev)
        uses: actions/upload-artifact@v7
        with:
          name: frontend-next-env-dev-${{ github.run_id }}
          path: apps/frontend/.open-next/cloudflare/next-env.mjs
          if-no-files-found: error

      - name: Build and deploy to Cloudflare Workers (Dev)
        id: deploy-frontend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env dev
          workingDirectory: apps/frontend
          secrets: |
            JWT_SECRET
          environment: dev
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Notify deployment
        run: |
          echo "✅ Frontend deployed to dev environment successfully!"
          echo "Worker: basic-knowledge-for-web-frontend-dev"
          echo "Deployment URL: ${{ steps.deploy-frontend.outputs.deployment-url }}"
