name: Deploy to Production Environment

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-prod

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd apps/backend
          bun install

      - name: Run database migrations
        run: |
          cd apps/backend
          bun run db:migrate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Deploy to Cloudflare Workers (Production)
        id: deploy-backend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env prod
          workingDirectory: apps/backend
          secrets: |
            DATABASE_URL
            JWT_SECRET
          environment: prod
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Notify deployment
        run: |
          echo "✅ Backend deployed to production environment successfully!"
          echo "Worker: basic-knowledge-for-web-backend"
          echo "Deployment URL: ${{ steps.deploy-backend.outputs.deployment-url }}"

  deploy-frontend:
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd apps/frontend
          bun install

      - name: Build frontend
        run: |
          cd apps/frontend
          rm -f .env .env.local .env.production
          {
            echo "NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}"
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
          } > .env.production
          bun run build:cloudflare
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Upload next-env artifact (prod)
        uses: actions/upload-artifact@v7
        with:
          name: frontend-next-env-prod-${{ github.run_id }}
          path: apps/frontend/.open-next/cloudflare/next-env.mjs
          if-no-files-found: error

      - name: Build and deploy to Cloudflare Workers (Production)
        id: deploy-frontend
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --env prod
          workingDirectory: apps/frontend
          secrets: |
            JWT_SECRET
          environment: prod
        env:
          NEXT_PUBLIC_API_URL: ${{ vars.NEXT_PUBLIC_API_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Notify deployment
        run: |
          echo "✅ Frontend deployed to production environment successfully!"
          echo "Worker: basic-knowledge-for-web-frontend"
          echo "Deployment URL: ${{ steps.deploy-frontend.outputs.deployment-url }}"
