name: Pull Request Build & Test

env:
  NEXT_PUBLIC_API_URL: http://localhost:8080

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened]

jobs:
  lint-and-test-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd apps/backend
          bun install

      - name: Build backend
        run: |
          cd apps/backend
          bun run build

      - name: Lint backend code
        run: |
          cd apps/backend
          bun run lint

      - name: Type check backend
        run: |
          cd apps/backend
          bun run type-check

      - name: Test backend
        run: |
          cd apps/backend
          bun run test

  lint-and-test-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: |
          cd apps/frontend
          bun install

      - name: Build for Cloudflare
        run: |
          cd apps/frontend
          bun run build:cloudflare

      - name: Lint frontend code
        run: |
          cd apps/frontend
          bun run lint

      - name: Type check frontend
        run: |
          cd apps/frontend
          bun run type-check

      - name: Test frontend
        run: |
          cd apps/frontend
          bun run test
