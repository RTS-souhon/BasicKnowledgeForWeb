version: 2
updates:
  - package-ecosystem: "bun"
    directories:
      - "/**/*"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "*"
        update-types: [
          "version-update:semver-major"
        ]
