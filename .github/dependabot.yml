version: 2
updates:
  - package-ecosystem: "bun"
    directory: "/"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "bun"
    directory: "/apps/backend"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      drizzle:
        patterns:
          - "drizzle-orm"
          - "drizzle-kit"

  - package-ecosystem: "bun"
    directory: "/apps/frontend"
    schedule:
      interval: "daily"
    cooldown:
      default-days: 5
      semver-minor-days: 7
      semver-patch-days: 3
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
